services:
  - type: web
    name: nptel-mock-exam
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      # Auto-generated once; never changes between deploys (keeps sessions alive)
      - key: SECRET_KEY
        generateValue: true
      # Paste these in Render Dashboard → Environment:
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      # Set this to your PostgreSQL connection string (see setup instructions below)
      # Option A — Render PostgreSQL: link via Render dashboard → Database → Connect
      # Option B — Supabase (free forever): supabase.com → Project → Settings → Database → URI
      # Option C — Neon (free forever): neon.tech → Connection Details → Connection string
      - key: DATABASE_URL
        sync: false
