<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assignments Viewer — Joy of Computing Using Python</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<style>
  .viewer-layout {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 56px);
  }

  .viewer-controls {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .year-tabs {
    display: flex;
    gap: 6px;
  }

  .year-tab {
    padding: 7px 18px;
    font-size: 14px;
    font-weight: 600;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--white);
    color: var(--text-2);
    cursor: pointer;
    transition: all 0.15s;
  }
  .year-tab:hover { background: var(--bg); }
  .year-tab.active {
    background: var(--blue);
    color: white;
    border-color: var(--blue);
  }

  .week-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }

  .week-tab {
    padding: 6px 12px;
    font-size: 13px;
    font-weight: 500;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: var(--white);
    color: var(--text-2);
    cursor: pointer;
    transition: all 0.15s;
    min-width: 60px;
    text-align: center;
  }
  .week-tab:hover { background: var(--bg); }
  .week-tab.active {
    background: var(--green);
    color: white;
    border-color: var(--green);
  }

  .controls-divider {
    width: 1px;
    height: 28px;
    background: var(--border);
    flex-shrink: 0;
  }

  .assignment-frame {
    flex: 1;
    border: none;
    width: 100%;
    background: white;
  }

  .mock-exam-link {
    margin-left: auto;
    font-size: 13px;
    font-weight: 600;
    color: var(--blue);
    text-decoration: none;
    white-space: nowrap;
  }
  .mock-exam-link:hover { text-decoration: underline; }

  @media (max-width: 640px) {
    .viewer-controls { padding: 10px 12px; gap: 8px; }
    .year-tab { padding: 6px 12px; font-size: 13px; }
    .week-tab { padding: 5px 9px; font-size: 12px; min-width: 50px; }
  }
</style>
</head>
<body>

<div class="navbar">
  <div class="navbar-inner">
    <div style="display:flex;align-items:center;gap:12px;">
      <span style="background:var(--green);color:white;font-weight:700;font-size:11px;padding:5px 11px;border-radius:6px;letter-spacing:1px;">NPTEL</span>
      <div class="hide-mobile">
        <div style="font-weight:700;font-size:15px;">Joy of Computing Using Python</div>
        <div style="font-size:12px;color:var(--text-3);">Assignments Viewer</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <a href="/mock-exam" class="hide-mobile btn btn-outline btn-sm">Mock Tests</a>
      {% if user_picture %}
      <img src="{{ user_picture }}" alt="{{ user_name }}" class="user-avatar" title="{{ user_name }}">
      {% endif %}
      <span class="hide-mobile" style="font-size:13px;font-weight:600;color:var(--text-2);">{{ user_name }}</span>
      <a href="/logout" class="btn btn-outline btn-sm">Sign out</a>
    </div>
  </div>
</div>

<div class="viewer-layout">
  <div class="viewer-controls">
    <div class="year-tabs" id="yearTabs">
      <button class="year-tab" data-year="2024" onclick="selectYear(2024)">2024</button>
      <button class="year-tab" data-year="2025" onclick="selectYear(2025)">2025</button>
      <button class="year-tab active" data-year="2026" onclick="selectYear(2026)">2026</button>
    </div>
    <div class="controls-divider"></div>
    <div class="week-tabs" id="weekTabs">
      {% for w in range(1, 13) %}
      <button class="week-tab {% if w == default_week %}active{% endif %}"
              data-week="{{ w }}"
              onclick="selectWeek({{ w }})">Week {{ w }}</button>
      {% endfor %}
    </div>
    <a href="/mock-exam" class="mock-exam-link hide-desktop" style="display:none">Mock Tests →</a>
  </div>

  <iframe id="assignmentFrame"
          class="assignment-frame"
          src="/assignment/{{ default_year }}/{{ default_week }}"
          title="Assignment content"></iframe>
</div>

<script>
  let currentYear = {{ default_year }};
  let currentWeek = {{ default_week }};

  function selectYear(year) {
    currentYear = year;
    document.querySelectorAll('.year-tab').forEach(t => {
      t.classList.toggle('active', parseInt(t.dataset.year) === year);
    });
    loadAssignment();
  }

  function selectWeek(week) {
    currentWeek = week;
    document.querySelectorAll('.week-tab').forEach(t => {
      t.classList.toggle('active', parseInt(t.dataset.week) === week);
    });
    loadAssignment();
  }

  function loadAssignment() {
    document.getElementById('assignmentFrame').src =
      `/assignment/${currentYear}/${currentWeek}`;
  }
</script>

</body>
</html>
