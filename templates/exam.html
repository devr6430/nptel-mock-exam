<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mock Test {{ test_id }} — NPTEL</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<!-- Top bar -->
<div class="gc" style="position:fixed;top:0;left:0;right:0;z-index:50;border-radius:0;border-top:0;border-left:0;border-right:0;border-bottom:2px solid rgba(0,255,133,0.3);padding:10px 16px;display:flex;align-items:center;gap:12px;">
  <div style="display:flex;align-items:center;gap:8px;min-width:90px;">
    <a href="/" style="font-weight:900;font-size:13px;color:var(--neon);text-decoration:none;">NPTEL</a>
    <span style="font-size:11px;color:var(--text-dim);">Test {{ test_id }}</span>
  </div>
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;">
    <span style="font-size:11px;font-weight:600;">Q <span id="q-current">1</span> / {{ total }}</span>
    <div style="width:100%;max-width:200px;height:4px;border-radius:2px;background:var(--glass);overflow:hidden;">
      <div id="progress-bar" style="height:100%;border-radius:2px;background:var(--neon);width:0%;transition:width 0.4s;"></div>
    </div>
  </div>
  <div style="min-width:80px;text-align:right;">
    <span id="timer" style="font-family:monospace;font-weight:700;font-size:16px;">3:00:00</span>
  </div>
</div>

<!-- Main -->
<div style="max-width:850px;margin:0 auto;padding:68px 16px 40px;display:grid;grid-template-columns:1fr;gap:16px;" id="exam-layout">

  <!-- Question card -->
  <div class="gc" style="padding:22px;" id="question-card">
    <div style="display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-bottom:14px;" id="q-meta">
      <span id="q-section-tag" style="padding:3px 10px;border-radius:8px;font-size:11px;font-weight:700;">A</span>
      <span id="q-week-tag" style="font-size:12px;color:var(--text-muted);">Week —</span>
      <span id="q-topic-tag" style="font-size:12px;color:var(--text-dim);">—</span>
    </div>

    <p id="q-text" style="font-size:16px;font-weight:600;line-height:1.65;margin:0 0 20px;">Loading question…</p>

    <div id="options-grid" style="display:flex;flex-direction:column;gap:10px;"></div>

    <div id="feedback-box" class="hidden" style="margin-top:16px;border-radius:var(--radius);padding:14px 16px;border:1px solid var(--glass-border);">
      <p id="feedback-text" style="font-weight:700;font-size:14px;margin:0;"></p>
      <p id="explanation-text" style="font-size:12px;margin:6px 0 0;color:var(--text-muted);"></p>
    </div>

    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:14px;">
      <span id="q-number-badge" style="font-size:12px;color:var(--text-dim);"></span>
      <button id="btn-next" class="btn-neon hidden" style="padding:8px 20px;font-size:13px;" onclick="nextQuestion()">Next →</button>
      <a id="btn-finish" href="/result" class="btn-neon hidden" style="padding:8px 20px;font-size:13px;background:var(--blue);box-shadow:0 0 20px rgba(0,116,255,0.3);">View Results</a>
    </div>
  </div>

  <!-- Nav panel (desktop only) -->
  <div class="gc hide-mobile" id="nav-panel" style="padding:12px;position:sticky;top:68px;max-width:160px;justify-self:end;">
    <p style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);margin:0 0 8px;">Questions</p>
    <div id="nav-grid" style="display:grid;grid-template-columns:repeat(5,1fr);gap:4px;">
      {% for i in range(total) %}
      <button class="nav-dot" id="nav-{{ i }}" onclick="jumpTo({{ i }})" style="width:100%;aspect-ratio:1;font-size:10px;font-weight:600;cursor:pointer;padding:0;line-height:1;">{{ i+1 }}</button>
      {% endfor %}
    </div>
  </div>

</div>

<style>
  @media(min-width:900px) {
    #exam-layout { grid-template-columns: 1fr 170px; }
  }
</style>

<script>
  window.EXAM_TOTAL = {{ total }};
  window.EXAM_DURATION = {{ duration }};
  window.TEST_ID = {{ test_id }};
</script>
<script src="{{ url_for('static', filename='exam.js') }}"></script>
</body>
</html>
