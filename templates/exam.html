<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mock Test {{ test_id }} — NPTEL</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body style="background:var(--white);">

<div class="topbar">
  <div style="display:flex;align-items:center;gap:8px;min-width:80px;">
    <a href="/" style="font-weight:700;font-size:13px;color:var(--green);text-decoration:none;">NPTEL</a>
    <span style="font-size:11px;color:var(--text-3);">Test {{ test_id }}</span>
  </div>
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;">
    <span style="font-size:11px;font-weight:600;">Q <span id="q-current">1</span> / {{ total }}</span>
    <div class="progress-track" style="width:100%;max-width:200px;">
      <div class="progress-fill" id="progress-bar" style="width:0%;"></div>
    </div>
  </div>
  <div style="min-width:75px;text-align:right;">
    <span class="timer" id="timer">3:00:00</span>
  </div>
</div>

<div style="max-width:800px;margin:0 auto;padding:64px 16px 40px;display:grid;grid-template-columns:1fr;gap:16px;" id="exam-layout">

  <div class="card" style="padding:22px;" id="question-card">
    <div style="display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin-bottom:14px;" id="q-meta">
      <span class="badge" id="q-section-tag" style="font-size:11px;">A</span>
      <span style="font-size:12px;color:var(--text-3);" id="q-week-tag">Week —</span>
      <span style="font-size:12px;color:var(--text-3);" id="q-topic-tag">—</span>
    </div>

    <p id="q-text" style="font-size:16px;font-weight:600;line-height:1.7;margin-bottom:20px;">Loading question…</p>

    <div id="options-grid" style="display:flex;flex-direction:column;gap:8px;"></div>

    <div id="feedback-box" class="feedback hidden">
      <p id="feedback-text" style="font-weight:700;font-size:14px;margin:0;"></p>
      <p id="explanation-text" style="font-size:13px;margin:5px 0 0;color:var(--text-2);"></p>
    </div>

    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:14px;">
      <span id="q-number-badge" style="font-size:12px;color:var(--text-3);"></span>
      <button id="btn-next" class="btn btn-green btn-sm hidden" onclick="nextQuestion()">Next →</button>
      <a id="btn-finish" href="/result" class="btn btn-blue btn-sm hidden">View Results</a>
    </div>
  </div>

  <div class="card hide-mobile" id="nav-panel" style="padding:12px;position:sticky;top:60px;max-width:150px;justify-self:end;">
    <p style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-3);margin-bottom:8px;">Questions</p>
    <div id="nav-grid" style="display:grid;grid-template-columns:repeat(5,1fr);gap:3px;">
      {% for i in range(total) %}
      <button class="nav-dot" id="nav-{{ i }}" onclick="jumpTo({{ i }})">{{ i+1 }}</button>
      {% endfor %}
    </div>
  </div>

</div>

<style>
  @media(min-width:860px) { #exam-layout { grid-template-columns: 1fr 160px; } }
</style>

<script>
  window.EXAM_TOTAL = {{ total }};
  window.EXAM_DURATION = {{ duration }};
  window.TEST_ID = {{ test_id }};
</script>
<script src="{{ url_for('static', filename='exam.js') }}"></script>
</body>
</html>
